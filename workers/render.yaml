services:
- type: web
  name: kammandor-intel-workers
  runtime: python
  rootDir: workers
  buildCommand: pip install -r requirements.txt
  startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  healthCheckPath: /health
  plan: starter
  envVars:
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: ANTHROPIC_API_KEY
    sync: false
  - key: ZHIPU_API_KEY
    sync: false
  - key: OPENAI_API_KEY
    sync: false
  - key: GOOGLE_API_KEY
    sync: false
  - key: AI_MODEL_ANTHROPIC
    value: claude-opus-4-5
  - key: AI_MODEL_OPENAI
    value: gpt-4o-mini
  - key: AI_MODEL_GOOGLE
    value: gemini-1.5-flash
  - key: AI_MODEL_ZHIPU
    value: glm-4-flash
  - key: PYTHON_VERSION
    value: 3.11.9
  - key: OPENROUTER_API_KEY
    sync: false
  - key: AI_MODEL_OPENROUTER
    value: openai/gpt-4o-mini
