services:
- type: web
  name: kammandor-intel-workers
  runtime: python
  rootDir: workers
  buildCommand: pip install -r requirements.txt
  startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  healthCheckPath: /health
  plan: starter
  # AI provider keys are resolved from the Supabase Vault (env → Vault fallback
  # in app/config.py), so a worker only needs the two Supabase values below.
  # Model IDs are NOT env pins anymore — the model matrix lives in app/moe.py.
  # (No GOOGLE/Gemini, no direct Zhipu: GLM is served via OpenRouter.)
  envVars:
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: PYTHON_VERSION
    value: 3.11.9
  # Optional direct-key overrides (leave unset to use the Vault):
  - key: ANTHROPIC_API_KEY
    sync: false
  - key: OPENAI_API_KEY
    sync: false
  - key: OPENROUTER_API_KEY
    sync: false
  - key: XAI_API_KEY
    sync: false
